apiVersion: v1
kind: Secret

metadata:
  name: mern-secret
  namespace: {{ .Values.namespace }}

type: Opaque

stringData:

  MONGO_USERNAME: "{{ .Values.mongodb.username }}"

  MONGO_PASSWORD: "{{ .Values.mongodb.password }}"

  MONGO_DATABASE: "{{ .Values.mongodb.database }}"

  MONGO_CONN_STR: "mongodb://{{ .Values.mongodb.username }}:{{ .Values.mongodb.password }}@mongodb-service:27017/{{ .Values.mongodb.database }}?authSource=admin"