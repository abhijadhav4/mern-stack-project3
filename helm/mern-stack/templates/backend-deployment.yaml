apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: {{ .Values.namespace }}

spec:
  replicas: {{ .Values.backend.replicaCount }}

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend

          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}

          ports:
            - containerPort: {{ .Values.backend.service.targetPort }}

          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: mern-config
                  key: PORT

            - name: USE_DB_AUTH
              value: "true"

            - name: MONGO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mern-secret
                  key: MONGO_USERNAME

            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mern-secret
                  key: MONGO_PASSWORD

            - name: MONGO_CONN_STR
              valueFrom:
                secretKeyRef:
                  name: mern-secret
                  key: MONGO_CONN_STR

          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.backend.service.targetPort }}
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.backend.service.targetPort }}
            initialDelaySeconds: 20
            periodSeconds: 10

          startupProbe:
            httpGet:
              path: /started
              port: {{ .Values.backend.service.targetPort }}
            failureThreshold: 30
            periodSeconds: 10
