server:
  enabled: true

  service:
    type: LoadBalancer

  persistentVolume:
    enabled: true
    size: 10Gi
    storageClass: gp2

  global:
    scrape_interval: 15s
    evaluation_interval: 15s

alertmanager:
  enabled: true

  service:
    type: ClusterIP

  persistentVolume:
    enabled: true
    size: 2Gi
    storageClass: gp2

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true

pushgateway:
  enabled: false

rbac:
  create: true

extraScrapeConfigs: |
  - job_name: "backend"
    static_configs:
      - targets:
          - backend-service.mern.svc.cluster.local:3500
