apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor

metadata:
  name: backend-servicemonitor
  namespace: monitoring

  labels:
    release: prometheus

spec:
  selector:
    matchLabels:
      app: backend

  namespaceSelector:
    matchNames:
      - mern

  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
