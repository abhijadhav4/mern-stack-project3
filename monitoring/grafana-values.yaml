adminUser: admin

adminPassword: admin123

service:
  type: LoadBalancer
  port: 80

persistence:
  enabled: true

  accessModes:
    - ReadWriteOnce

  size: 10Gi

datasources:
  datasources.yaml:
    apiVersion: 1

    datasources:
      - name: Prometheus

        type: prometheus

        access: proxy

        isDefault: true

        url: http://prometheus-server

        editable: true

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1

    providers:
      - name: default

        orgId: 1

        folder: ""

        type: file

        disableDeletion: false

        editable: true

        options:
          path: /var/lib/grafana/dashboards

dashboards:
  default:
    kubernetes-cluster:
      gnetId: 7249
      revision: 1
      datasource: Prometheus

    node-exporter:
      gnetId: 1860
      revision: 37
      datasource: Prometheus

    kubernetes-pods:
      gnetId: 6417
      revision: 1
      datasource: Prometheus

    kubernetes-deployment:
      gnetId: 8588
      revision: 1
      datasource: Prometheus