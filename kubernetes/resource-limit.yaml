apiVersion: v1
kind: LimitRange

metadata:
  name: mern-resource-limits
  namespace: mern

spec:
  limits:

    - type: Container

      default:
        cpu: "500m"
        memory: "512Mi"

      defaultRequest:
        cpu: "250m"
        memory: "256Mi"

      max:
        cpu: "1000m"
        memory: "1Gi"

      min:
        cpu: "100m"
        memory: "128Mi"

---

apiVersion: v1
kind: ResourceQuota

metadata:
  name: mern-resource-quota
  namespace: mern

spec:
  hard:
    requests.cpu: "4"
    requests.memory: "4Gi"
    limits.cpu: "8"
    limits.memory: "8Gi"
    pods: "20"
