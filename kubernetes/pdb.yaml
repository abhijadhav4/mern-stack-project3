apiVersion: policy/v1
kind: PodDisruptionBudget

metadata:
  name: backend-pdb
  namespace: mern

spec:
  minAvailable: 1

  selector:
    matchLabels:
      app: backend

---

apiVersion: policy/v1
kind: PodDisruptionBudget

metadata:
  name: frontend-pdb
  namespace: mern

spec:
  minAvailable: 1

  selector:
    matchLabels:
      app: frontend
